<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan the QR Code</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: #111;
    color: white;
    overflow: hidden;
}

.slide {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #111, #222);
}

h1 {
    font-size: 4rem;
    margin-bottom: 20px;
}

p {
    font-size: 1.5rem;
    margin-bottom: 30px;
    color: #ddd;
}

img {
    width: 420px;
    max-width: 80vw;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
}

.footer {
    margin-top: 25px;
    font-size: 1rem;
    color: #aaa;
}
</style>
</head>
<body>

<div class="slide">
    <h1>We humbly request that you guys scan the QR Code</h1>
    <p>It will make this presentation less boring</p>

    <img src="images/qr.png" alt="QR Code">

    <div class="footer">
        Scan to visit Mystiks Horror Journalism
    </div>
</div>

</body>
</html>
